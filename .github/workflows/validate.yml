name: validate

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: install-mint
        run: npm install -g mint@4.2.577

      - name: mint-validate
        run: mint validate

      - name: mint-broken-links
        run: mint broken-links

      - name: api-reference-drift
        run: |
          set -euo pipefail
          curl -fsSL https://api.mountthor.com/openapi.json -o /tmp/live-admin.openapi.json
          jq -S '[.paths | keys[]]' /tmp/live-admin.openapi.json > /tmp/live-admin-paths.json
          jq -S '[.paths | keys[] | select(startswith("/v1/admin"))]' api-reference/customer-api.v1.openapi.json > /tmp/docs-admin-paths.json
          diff -u /tmp/live-admin-paths.json /tmp/docs-admin-paths.json
          jq -S '[.paths | keys[]]' api-reference/customer-compute-crds.v1.openapi.json > /tmp/compute-paths.json
          jq -S '[.paths | keys[] | select(startswith("/v1/compute"))]' api-reference/customer-api.v1.openapi.json > /tmp/docs-compute-paths.json
          diff -u /tmp/compute-paths.json /tmp/docs-compute-paths.json
