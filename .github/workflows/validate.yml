name: validate

"on":
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: install-mint
        run: npm install -g mint

      - name: mint-validate
        run: mint validate

      - name: mint-broken-links
        run: mint broken-links
